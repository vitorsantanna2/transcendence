<!DOCTYPE html>
<html>
<head>
    <title>Conversation with {{ user.name }}</title>
</head>
<body>
    <h1>Conversation with {{ user.name }}</h1>
    <p>User is active: {{ user.is_active }}</p>
    <ul>
        {% for message in messages %}
            <li>{{ message.content }}</li>
        {% endfor %}
    </ul>
</body>
</html>
