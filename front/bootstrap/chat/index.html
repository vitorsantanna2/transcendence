<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <!-- Style CSS -->
    <link rel="stylesheet" href="styles.css"/>
    <!-- icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Chat</title>
  </head>
  <body> 
    <!-- NAVBAR -->
    <div class="bg-cover">
      <div class="main w-100 mx-5 d-flex justify-content-center align-items-center">
        <div class="row custom-row gx-5">
            <ul class="nav tab flex-column nav-pills text-bg-secondary d-flex justify-content-around align-items-center">
              <li class="nav-item">
                <a class="nav-link" href="#">
                  <img src="../images/login.png" class="imgs">
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">
                  <img src="../images/pong.png" class="imgs">
                </a>
              </li>
              <li class="nav-item" href="#">
                  <img src="../images/torneio.png" class="imgs">
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">
                  <img src="../images/chat.png" class="imgs">
                </a>
              </li>
            </ul>
        </div>
        <!-- MAIN CONTAINER -->

        <div class="cover-container w-100">
          <div class="container-fluid h-100 w-100">
            <div class="row h-100">
              <div class="col-sm-8 d-flex custom-col align-items-center justify-content-center">
                <!-- chat main container -->
                <div class="chat-container d-flex flex-column justify-content-between" >
                  <!-- header section -->
                  <div class="chat-header d-flex align-items-center justify-content-around">
                    <div class="container1 container-fluid">
                        <img src="../images/apollo.png" style="width: auto; height: 6vh;"class="profile-img">
                        <div class="user-name">
                            <h3>Apollo</h3>
                        </div>
                    </div>
                  </div>
                  <!-- inbox section -->
                  <div class="chat-inbox d-flex justify-content-center align-items-center">
                    <p> here is some dummy content</p>
                  </div>
                  <!-- bottom section -->
                  <div class="chat-bottom d-flex flex-row justify-content-end align-items-center">
                    <form class="input container-fluid d-flex flex-column">
                      <input type="text" class="form-control" placeholder="Type your message">
                    </form>
                      <button type="button" style="margin-right: 2vw;" class="btn">
                        <img src="../images/send.png" style="width: auto; height: 3vh; opacity: 1 !important;"></img>
                      </button>
                  </div>
                  <!-- end -->
                </div>
              </div>
              <div class="col-sm-4 d-flex custom-col align-items-center justify-content-center">
                <div class="friends-container d-flex flex-column justify-content-center align-items-center">
                    <form class="search container-fluid d-flex justify-content-center">
                      <input type="text" class="form-control" style="margin-left: 2vh" placeholder="Search friends">
                        <button type="button" class="btn">
                        <img src="../images/search2.png" style="transform: scaleX(-1); width: auto; height: 3vh; opacity: 1 !important;"></img>
                        </button>
                    </form>
                    <div class="list-container">

                        <div class="friend d-flex flex-row justify-content-start">
                          <img src="../images/pikachu.png" style="width: auto; height: 6vh;" class="ml-4 mr-1 mt-1"></img>
                          <div class="text-quarter">
                            <p class="font-weight-bold mb-0">Pikachu</p>
                            <small class="message-status">Mensagem</small>
                          </div>
                        </div>

                        <div class="friend d-flex flex-row justify-content-start">
                          <img src="../images/squirtle.png" style="width: auto; height: 6vh;" class="ml-4 mr-1 mt-1"></img>
                          <div class="text-quarter">
                            <p class="font-weight-bold mb-0">Squirtle</p>
                            <small class="message-status">Mensagem</small>
                          </div>
                        </div>
 
                        <div class="friend d-flex flex-row justify-content-start">
                          <img src="../images/socrates.png" style="width: auto; height: 6vh;" class="ml-4 mr-1 mt-1"></img>
                          <div class="text-quarter">
                            <p class="font-weight-bold mb-0">Socrates</p>
                            <small class="message-status">Mensagem</small>
                          </div>
                        </div>

                        <div class="friend d-flex flex-row justify-content-start">
                          <img src="../images/bulba.png" style="width: auto; height: 6vh;" class="ml-4 mr-1 mt-1"></img>
                          <div class="text-quarter">
                            <p class="font-weight-bold mb-0">Bulba</p>
                            <small class="message-status">Mensagem</small>
                          </div>
                        </div>
                    </div>


                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- Optional JavaScript -->
        <!-- jQuery first, then Popper.js, then Bootstrap JS -->
      </div>
    </div>
        <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
  </body>
</html>
